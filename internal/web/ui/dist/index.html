<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>plumb web</title>
<style>
  body{margin:0;background:#121310;color:#ece8dc;font:15px/1.6 ui-sans-serif,-apple-system,system-ui,sans-serif;
    display:flex;min-height:100vh;align-items:center;justify-content:center}
  .box{max-width:520px;padding:32px;text-align:center}
  .logo{width:40px;height:40px;border-radius:11px;margin:0 auto 18px;
    background:linear-gradient(135deg,#e08a55,#b35a2e);box-shadow:0 10px 30px rgba(224,138,85,.3)}
  h1{font-size:20px;margin:0 0 8px}
  p{color:#aaa595;margin:6px 0}
  code{background:#22231d;border:1px solid #2e2f27;border-radius:6px;padding:2px 7px;color:#e08a55}
</style>
</head>
<body>
  <div class="box">
    <div class="logo"></div>
    <h1>plumb web</h1>
    <p>The web UI has not been built yet.</p>
    <p>Run <code>make web-ui</code> in the plumb source tree, then rebuild the daemon.</p>
  </div>
</body>
</html>
