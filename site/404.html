<style>
*{margin:0;box-sizing:border-box}
body{
  min-height:100vh;background:#f3efe6;color:#1c1a16;
  font-family:'Fraunces',Georgia,serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px;-webkit-font-smoothing:antialiased;
}
.bob{margin-bottom:34px;animation:sway 6s ease-in-out infinite;transform-origin:top center}
@keyframes sway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
.code{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.26em;text-transform:uppercase;color:#a4502b;margin-bottom:18px}
h1{font-weight:300;font-size:clamp(36px,7vw,68px);letter-spacing:-.02em;line-height:1}
h1 em{font-style:italic}
p{color:#4a463d;font-size:18px;margin:20px 0 34px;max-width:42ch}
a{font-family:'Inter',sans-serif;font-size:15px;font-weight:500;color:#f3efe6;background:#1c1a16;border:1.5px solid #1c1a16;border-radius:999px;padding:13px 26px;text-decoration:none;transition:.18s}
a:hover{background:#2f5141;border-color:#2f5141}
</style>
</head>
<body>
<svg class="bob" width="38" height="104" viewBox="0 0 38 104" fill="none" xmlns="http://www.w3.org/2000/svg">
  <line x1="19" y1="0" x2="19" y2="70" stroke="#1c1a16" stroke-width="1.4"/>
  <path d="M19 70 L31 86 L19 104 L7 86 Z" fill="#2f5141" stroke="#1c1a16" stroke-width="1.2"/>
</svg>
<div class="code">Error 404</div>
<h1>Off the <em>true line.</em></h1>
<p>That page isn't on the plumb line. Let's drop you back to something solid.</p>

</body>
