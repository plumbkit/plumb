<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
body{
  background:#f3efe6;color:#1c1a16;
  font-family:'Fraunces',Georgia,serif;
  position:relative;
  background-image:
    linear-gradient(rgba(47,81,65,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(47,81,65,.05) 1px,transparent 1px);
  background-size:40px 40px;
}
.pad{position:absolute;inset:0;padding:74px 84px;display:flex;flex-direction:column;justify-content:space-between}
.top{display:flex;align-items:center;gap:16px;font-size:30px;font-weight:500}
.kick{font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.26em;text-transform:uppercase;color:#a4502b;margin-bottom:26px}
h1{font-weight:300;font-size:92px;line-height:.98;letter-spacing:-.02em;max-width:18ch}
h1 em{font-style:italic;font-weight:400}
.sub{font-size:27px;color:#4a463d;margin-top:30px;max-width:40ch;line-height:1.4}
.foot{display:flex;align-items:center;gap:22px;font-family:'JetBrains Mono',monospace;font-size:18px;color:#8a8475;letter-spacing:.04em}
.foot .chip{background:#ece6d9;border:1px solid #d6cfbf;border-radius:8px;padding:7px 14px;color:#1c1a16;font-size:16px}
.bob{position:absolute;top:0;right:120px}
.bob .line{position:absolute;top:0;left:0;width:2px;height:150px;background:#1c1a16}
</style>
</head>
<body>
<svg class="bob" width="120" height="300" viewBox="0 0 120 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <line x1="60" y1="0" x2="60" y2="196" stroke="#1c1a16" stroke-width="2.2"/>
  <path d="M60 196 L86 230 L60 300 L34 230 Z" fill="#2f5141" stroke="#1c1a16" stroke-width="2"/>
  <circle cx="60" cy="228" r="4" fill="#f3efe6"/>
</svg>
<div class="pad">
  <div class="top">
    <svg width="30" height="38" viewBox="0 0 14 18" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="7" y1="0" x2="7" y2="7" stroke="#1c1a16" stroke-width="1.4"/><path d="M7 7 L11 11 L7 18 L3 11 Z" fill="#2f5141"/></svg>
    plumb
  </div>
  <div>
    <div class="kick">An MCP server · LSP-backed · MIT</div>
    <h1>IDE intelligence for <em>thinking</em> machines</h1>
    <div class="sub">Go-to-definition, semantic rename, diagnostics, and concurrency-safe edits — 49 tools, powered by real language servers.</div>
  </div>
  <div class="foot">
    <span class="chip">go install …/plumb@latest</span>
    <span>github.com/golimpio/plumb</span>
  </div>
</div>
</body>
</html>
