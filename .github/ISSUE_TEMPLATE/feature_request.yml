name: Feature request
description: Suggest an improvement or new capability for Plumb.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point, not just the proposed solution.
      placeholder: When working on ..., I can't ... because ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Plumb to do? A new tool, a config knob, an adapter?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New LSP adapter / language
        - Filesystem / write tools
        - Topology / search
        - Git tooling
        - Daemon / proxy / reliability
        - TUI
        - Config / setup
        - Docs
        - Other
    validations:
      required: false
