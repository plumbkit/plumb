name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install gopls
        run: go install golang.org/x/tools/gopls@latest

      - name: Install pyright
        run: npm install -g pyright

      - name: Install jdtls
        run: |
          # jdtls is published to download.eclipse.org, not GitHub Releases
          # (the repo's only "release" is an unrelated pre-release VSIX, so the
          # GitHub releases/latest API 404s). Resolve the newest stable
          # milestone and its timestamped tarball, falling back to the rolling
          # snapshot if the milestone listing cannot be parsed.
          BASE="https://download.eclipse.org/jdtls/milestones"
          VERSION=$(curl -fsSL "$BASE/" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | sort -uV | tail -1)
          if [ -n "$VERSION" ]; then
            FILE=$(curl -fsSL "$BASE/$VERSION/" | grep -oE "jdt-language-server-$VERSION-[0-9]+\.tar\.gz" | sort -u | tail -1)
          fi
          if [ -n "$VERSION" ] && [ -n "$FILE" ]; then
            ASSET_URL="$BASE/$VERSION/$FILE"
          else
            ASSET_URL="https://download.eclipse.org/jdtls/snapshots/jdt-language-server-latest.tar.gz"
          fi
          echo "Downloading jdtls from $ASSET_URL"
          curl -fsSL "$ASSET_URL" -o jdtls.tar.gz
          mkdir -p "$HOME/.local/jdtls" "$HOME/.local/bin"
          tar -xzf jdtls.tar.gz -C "$HOME/.local/jdtls"
          cat > "$HOME/.local/bin/jdtls" <<'SCRIPT'
          #!/usr/bin/env bash
          JDTLS_HOME="$HOME/.local/jdtls"
          exec java \
            -jar "$JDTLS_HOME/plugins"/org.eclipse.equinox.launcher_*.jar \
            -configuration "$JDTLS_HOME/config_linux" \
            "$@"
          SCRIPT
          chmod +x "$HOME/.local/bin/jdtls"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Integration tests
        env:
          JDTLS_FRESH_DATA: "1"
        run: go test -tags=integration -timeout=10m ./...
