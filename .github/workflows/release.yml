name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub release and upload artifacts

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Default token creates the release in THIS repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with `repo` scope on plumbkit/homebrew-plumb, so the formula can be
          # pushed cross-repo. Create the tap repo and this secret before tagging.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
