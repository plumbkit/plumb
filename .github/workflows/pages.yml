name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Least-privilege token scoped for a Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/configure-pages@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Render the Markdown blog posts into styled HTML before publishing.
      # Markdown under site/blog/posts/ is the source of truth; the generated
      # *.html + pygments.css are git-ignored and built here. See scripts/build-blog.py.
      - name: Build blog
        run: |
          pip install -r scripts/requirements.txt
          python3 scripts/build-blog.py

      # The rest of the site is static — published verbatim alongside the built blog.
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

      - id: deployment
        uses: actions/deploy-pages@v4
