version: "2"
linters:
  enable:
    - gocyclo
    - gosec
    - prealloc
    - revive
    - unparam
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: exported
          disabled: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
          - unparam
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/plumbkit/plumb
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
